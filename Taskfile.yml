version: '3'

tasks:
  checkpoint:
    dir: scripts
    cmds:
      - npx zx checkpoint.mjs

  download:
    dir: mainrun
    cmds:
      - python3 download_dataset.py

  train:
    deps: [checkpoint, download]
    dir: mainrun
    cmds:
      - python3 train.py

  test:
    cmds:
      - python3 -m unittest discover -s tests

  sweep:
    cmds:
      - python3 analysis/sweep.py {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}sweeps/lr.yaml{{end}}

  submit:
    deps: [checkpoint]
    dir: scripts
    cmds:
      - npx zx submit.mjs
    