# Sweep: dropout, at the best LR + weight decay. After the warmup sweep, add the
# winning warmup_frac to base (if it isn't 0.1).
# Run from the repo root:  task sweep -- sweeps/dropout.yaml
base:
  lr: 0.001
  weight_decay: 0.1
runs:
  - {name: dropout_0p1,  dropout: 0.1}
  - {name: dropout_0p15, dropout: 0.15}
  - {name: dropout_0p2,  dropout: 0.2}
