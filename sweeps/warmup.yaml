# Sweep: warmup fraction, at the best LR. Update base.lr if the LR sweep moves it.
# Run from the repo root:  task sweep -- sweeps/warmup.yaml
base:
  lr: 0.001
  weight_decay: 0.1
runs:
  - {name: warmup_0p4,  warmup_frac: 0.4}
  - {name: warmup_0p45, warmup_frac: 0.45}
  - {name: warmup_0p5,  warmup_frac: 0.5}
  - {name: warmup_0p55, warmup_frac: 0.55}
  - {name: warmup_0p6,  warmup_frac: 0.6}
